name: Build CroakVPN macOS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Download sing-box binary
        run: |
          curl -L -o singbox.tar.gz "https://github.com/SagerNet/sing-box/releases/download/v1.13.4/sing-box-1.13.4-darwin-arm64.tar.gz"
          tar -xzf singbox.tar.gz
          mkdir -p CroakVPN/Resources
          cp sing-box-1.13.4-darwin-arm64/sing-box CroakVPN/Resources/sing-box
          chmod +x CroakVPN/Resources/sing-box
          CroakVPN/Resources/sing-box version

      - name: Generate .xcodeproj
        run: xcodegen generate

      - name: Build CroakVPN
        run: |
          xcodebuild \
            -project CroakVPN.xcodeproj \
            -scheme CroakVPN \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Inject resources into bundle
        run: |
          APP="build/Build/Products/Release/CroakVPN.app"
          mkdir -p "$APP/Contents/Resources"
          cp CroakVPN/Resources/sing-box "$APP/Contents/Resources/sing-box"
          chmod +x "$APP/Contents/Resources/sing-box"
          if [ -f "CroakVPN/Resources/AppIcon.icns" ]; then
            cp CroakVPN/Resources/AppIcon.icns "$APP/Contents/Resources/AppIcon.icns"
            echo "AppIcon.icns injected"
          fi
          ls -lh "$APP/Contents/Resources/"

      - name: Package
        run: |
          cd build/Build/Products/Release
          ditto -c -k --keepParent CroakVPN.app CroakVPN-macOS.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CroakVPN-macOS
          path: build/Build/Products/Release/CroakVPN-macOS.zip
          retention-days: 30
