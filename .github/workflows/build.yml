name: Build CroakVPN macOS

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Download sing-box binaries (arm64 + amd64)
        run: |
          SINGBOX_VERSION="1.13.4"

          # arm64
          curl -L -o singbox-arm64.tar.gz "https://github.com/SagerNet/sing-box/releases/download/v${SINGBOX_VERSION}/sing-box-${SINGBOX_VERSION}-darwin-arm64.tar.gz"
          tar -xzf singbox-arm64.tar.gz
          mv "sing-box-${SINGBOX_VERSION}-darwin-arm64/sing-box" sing-box-arm64

          # amd64
          curl -L -o singbox-amd64.tar.gz "https://github.com/SagerNet/sing-box/releases/download/v${SINGBOX_VERSION}/sing-box-${SINGBOX_VERSION}-darwin-amd64.tar.gz"
          tar -xzf singbox-amd64.tar.gz
          mv "sing-box-${SINGBOX_VERSION}-darwin-amd64/sing-box" sing-box-amd64

          # Universal binary
          mkdir -p CroakVPN/Resources
          lipo -create sing-box-arm64 sing-box-amd64 -output CroakVPN/Resources/sing-box
          chmod +x CroakVPN/Resources/sing-box
          file CroakVPN/Resources/sing-box
          CroakVPN/Resources/sing-box version

      - name: Generate .xcodeproj
        run: xcodegen generate

      - name: Build CroakVPN
        run: |
          xcodebuild \
            -project CroakVPN.xcodeproj \
            -scheme CroakVPN \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Inject resources into bundle
        run: |
          APP="build/Build/Products/Release/CroakVPN.app"
          mkdir -p "$APP/Contents/Resources"
          cp CroakVPN/Resources/sing-box "$APP/Contents/Resources/sing-box"
          chmod +x "$APP/Contents/Resources/sing-box"
          if [ -f "CroakVPN/Resources/AppIcon.icns" ]; then
            cp CroakVPN/Resources/AppIcon.icns "$APP/Contents/Resources/AppIcon.icns"
            echo "AppIcon.icns injected"
          fi
          ls -lh "$APP/Contents/Resources/"
          file "$APP/Contents/Resources/sing-box"

      - name: Create DMG installer
        run: |
          APP="build/Build/Products/Release/CroakVPN.app"
          chmod +x scripts/create-dmg.sh
          bash scripts/create-dmg.sh \
            "$APP" \
            "installer/FIX.command" \
            "installer/background.png" \
            "build/CroakVPN-macOS.dmg"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: CroakVPN-macOS
          path: build/CroakVPN-macOS.dmg
          retention-days: 30

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/CroakVPN-macOS.dmg
          generate_release_notes: true
